# IIC-Forge Redis configuration.
#
# This file IS loaded by the `redis` service in the IIC-Forge Compose stack
# (compose.yml). The service mounts it read-only at
# /usr/local/etc/redis/redis.conf and starts Redis with:
#   redis-server /usr/local/etc/redis/redis.conf
#
# To verify the active configuration inside the running container:
#   docker compose exec redis redis-cli CONFIG GET appendonly
#   docker compose exec redis redis-cli CONFIG GET maxmemory-policy
#
# `dir /data` below matches the container's mounted volume (iic_redis_data).
#
# Durability: AOF every 1s — at most 1s of in-flight envelopes lost on crash.
# Eviction:   none — we never silently drop sensed events.

appendonly yes
appendfsync everysec
maxmemory 256mb
maxmemory-policy noeviction
save ""
dir /data
